name: Semgrep PR Scan
on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
permissions:
  contents: read
  security-events: write
  pull-requests: write
jobs:
  semgrep:
    name: Run Semgrep on Pull Request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep scan --config p/owasp-top-ten --config p/default --config p/ruby --config p/php --sarif --output semgrep.sarif || true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
