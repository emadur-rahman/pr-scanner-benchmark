name: CodeQL PR Scan
on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  codeql:
    name: Run CodeQL on Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          output: codeql-results
	  upload: never

      - name: Post CodeQL findings as PR comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, requests, glob

          sarif_files = glob.glob("codeql-results/**/*.sarif", recursive=True)

          findings = []
          for sarif_file in sarif_files:
              with open(sarif_file) as f:
                  data = json.load(f)
              for run in data.get("runs", []):
                  rules = {r["id"]: r for r in run.get("tool", {}).get("driver", {}).get("rules", [])}
                  for result in run.get("results", []):
                      rule_id = result.get("ruleId", "unknown")
                      rule = rules.get(rule_id, {})
                      message = result.get("message", {}).get("text", "")
                      severity = rule.get("properties", {}).get("problem.severity", "unknown")
                      locations = result.get("locations", [])
                      for loc in locations:
                          filepath = loc.get("physicalLocation", {}).get("artifactLocation", {}).get("uri", "unknown")
                          line = loc.get("physicalLocation", {}).get("region", {}).get("startLine", "?")
                          findings.append({
                              "rule": rule_id,
                              "file": filepath,
                              "line": line,
                              "message": message,
                              "severity": severity
                          })

          if not findings:
              body = "## CodeQL Findings\n\n✅ No findings detected."
          else:
              body = "## CodeQL Findings\n\n"
              for f in findings:
                  body += f"- **Rule:** {f['rule']}\n"
                  body += f"  - **File:** `{f['file']}` (line {f['line']})\n"
                  body += f"  - **Severity:** {f['severity']}\n"
                  body += f"  - **Message:** {f['message']}\n\n"

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr = os.environ["PR_NUMBER"]

          requests.post(
              f"https://api.github.com/repos/{repo}/issues/{pr}/comments",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github+json"},
              json={"body": body}
          )
          EOF